apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pathnex-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/pathnex/ArgoCd_lab.git'
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nginx   # <-- Deploy to `nginx` namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true